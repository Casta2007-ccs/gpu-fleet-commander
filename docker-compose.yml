version: '3.8'

services:
  # Outbound persistence storage (PostgreSQL)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gpu_fleet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gpu_fleet_secure_db_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gpu_fleet"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Outbound Pub/Sub & WebSocket event broker (Redis)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI API Control Plane Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:gpu_fleet_secure_db_pass_2026@postgres:5432/gpu_fleet
      REDIS_URL: redis://redis:6379/0
      API_KEY: gpu_fleet_secure_token_2026
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # GPU Node Client Simulator Instance 1
  worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    command: python cmd/worker/main.py
    environment:
      API_URL: http://api:8000
      API_KEY: gpu_fleet_secure_token_2026
    depends_on:
      api:
        condition: service_started

  # GPU Node Client Simulator Instance 2
  worker-2:
    build:
      context: .
      dockerfile: Dockerfile
    command: python cmd/worker/main.py
    environment:
      API_URL: http://api:8000
      API_KEY: gpu_fleet_secure_token_2026
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
